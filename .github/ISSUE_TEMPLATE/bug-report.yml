name: Bug Report
description: Report a bug, glitch, or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug!

        Please fill out this form as completely as possible. Clear bug reports help us fix issues faster.

        **Before submitting:** Search existing issues (open/closed) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what actually occurred, including any error messages.
      placeholder: "When I do X, Y occurs. Error log: ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: Describe the correct behavior.
      placeholder: "Z should have happened instead."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List clear, repeatable steps.
      placeholder: |
        1. Spawn as engineer
        2. Pick up welding tool
        3. Aim at damaged window
        4. Click - nothing happens
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How bad is the bug?
      options:
        - Minor (visual glitch, typo, annoyance)
        - Moderate (feature partially broken, workaround exists)
        - Major (feature completely broken, impacts gameplay)
        - Critical (crash, data loss, server issue)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Game version / build
      description: Which version of Hardlight are you running?
      placeholder: "e.g., v1.2.3 or latest main branch commit hash"
    validations:
      required: true

  - type: input
    id: context
    attributes:
      label: Server / Round ID / Timestamp
      description: If applicable – helps us match server logs.
      placeholder: "e.g., Hardlight-Main, Round 4821, 2026-05-06 ~14:30 UTC"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any error logs, console output, or attach screenshots.
      placeholder: "Paste logs here or drag and drop images"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission checklist
      description: Confirm the following before submitting
      options:
        - label: I have searched for existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this bug consistently with the steps above
          required: true
        - label: I understand that bug fixes will be tested locally before PR and tested again before merge
          required: true
