- type: trait
  id: Vampirism
  name: trait-name-Vampirism
  description: trait-description-Vampirism
  category: Physical
  cost: 4 # Whilst they can still eat everything this is literally only a positive trait.
  speciesBlacklist:
    - IPC
  mutuallyExclusiveTraits:
    - LesserVampirism
  components:
    - type: Vampirism
      succDelay: 3
      specialDigestible: # Vampires cannot eat food chat is that real
        tags:
        - IceCream
        - Pill
        - Crayon
        - Paper
      isSpecialDigestibleExclusive: true
      # Hardlight start
      overfedWalkMultiplier: 1.1
      overfedSprintMultiplier: 1.1
      peckishWalkMultiplier: 0.9
      peckishSprintMultiplier: 0.9
      starvingWalkMultiplier: 0.75
      starvingSprintMultiplier: 0.75
      overfedRegenAmount: 0.5
      unarmedDamageMultiplier: 1.3
      starvingDamageMultiplier: 1.5
      # Hardlight end

