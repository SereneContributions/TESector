- type: entity
  abstract: true
  parent: ClothingNeckBase
  id: BowtieBase
  components:
  - type: Tag
    tags:
    - Bunnysuit
    - ClothMade
    - WhitelistChameleon
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: bowtie-untie
    foldVerbText: bowtie-tie
  - type: FoldableClothing
    foldedEquippedPrefix: tied
    foldedHeldPrefix: tied
  - type: Sprite
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon-tied
      map: ["foldedLayer"]
      visible: false

