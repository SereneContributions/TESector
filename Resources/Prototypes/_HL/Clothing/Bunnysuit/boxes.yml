- type: entity
  parent: BoxBase
  id: BunnysuitBox
  name: bunnysuit box
  components:
  - type: Sprite
    sprite: _HL/Clothing/Bunnysuit/box.rsi
    state: icon
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,3,2
    whitelist:
      tags:
        - Bunnysuit
  - type: PhysicalComposition
    materialComposition:
      Cardboard: 100
  - type: Tag
    tags:
    - BoxCardboard

