- type: entity
  parent: ClothingMaskBaseButcherable
  id: ClothingGaiterBase
  description: A slightly worn neck gaiter, it's loose enough to be worn comfortably like a scarf. Commonly used by outdoorsmen and mercenaries, both to keep warm and keep debris away from the face.
  abstract: true
  components:
  - type: Clothing
    slots: [mask, neck]
  - type: IdentityBlocker
    coverage: MOUTH
  - type: HideLayerClothing
    slots:
    - Snout
    hideOnToggle: true
  - type: Tag
    tags:
    - ClothMade
    - WhitelistChameleon

- type: entity
  parent: ClothingGaiterBase
  id: ClothingGaiterCharcoal
  name: charcoal neck gaiter
