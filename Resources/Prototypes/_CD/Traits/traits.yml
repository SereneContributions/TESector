- type: trait
  id: Synthetic
  name: trait-synthetic-name
  description: trait-synthetic-desc
  category: Physical
  cost: 0 # HardLight: 4<0; Why did this cost 4?
  speciesBlacklist: # HardLight
  - IPC
  - Synth
  blacklist:
    components:
      - BorgChassis
  components:
    - type: Synthetic
    # Hardlight start: Gives Trinary
    - type: IntrinsicRadioReceiver
    - type: IntrinsicRadioTransmitter
      intrinsicChannels:
      - Trinary
    - type: ActiveRadio
      intrinsicChannels:
      - Trinary
    - type: EncryptionKeyHolder
      keySlots: 1
      examineWhileLocked: false
      preserveExistingChannels: true
      intrinsicChannels:
      - Trinary
    # Hardlight end
